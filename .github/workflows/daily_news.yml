name: Deploy Intelligence Dashboard
on:
  schedule:
    - cron: '30 10 * * *' # Updated to 8:17 AM EDT to avoid "top of the hour" traffic
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # <--- Updated from v4
      - name: Set up Python
        uses: actions/setup-python@v6 # <--- Updated from v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run Scraper
        run: python news_bot.py
      - name: Upload static files
        uses: actions/upload-pages-artifact@v4 # <--- Updated from v3
        with:
          path: "." 

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Already v4, but good to verify
