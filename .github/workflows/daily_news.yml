name: Deploy Intelligence Dashboard
on:
  schedule:
    - cron: '17 12 * * *' # Runs at 8:17 AM EDT (12:17 UTC)
  workflow_dispatch: # Manual button in Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python news_bot.py

      - name: Upload Static Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "." # Uploads the folder containing index.html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
